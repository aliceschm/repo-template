name: Create default labels

on:
  workflow_dispatch:  # runs manually in Actions > Run workflow

permissions:
  issues: write

jobs:
  create-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Create labels using GitHub Script
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const labels = [
             { name: "feat", color: "6ea8fe", description: "New features or enhancements to the project" },
             { name: "bug", color: "2f5d8a", description: "Fixes for code problems" },
             { name: "chore", color: "7fb3a6", description: "Maintenance without feature changes" },
             { name: "test", color: "4fa3a5", description: "Code tests and validations" },
             { name: "documentation", color: "9ec5e8", description: "Improvements or additions to documentation" },
             { name: "refactor", color: "3b7f6b", description: "Code cleanup and restructuring" },
             { name: "style", color: "a7c7e7", description: "Changes related to visual presentation only" }       

            ];

            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                  color: label.color,
                  description: label.description,
                });
                console.log(`Label '${label.name}' created.`);
              } catch (error) {
                if (error.status === 422) {
                  console.log(`Label '${label.name}' already exists.`);
                } else {
                  throw error;
                }
              }
            }
